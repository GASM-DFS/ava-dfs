name: Daily MLB DFS Optimizer

on:
  schedule:
    # Run daily at 5:00 PM EST (21:00 UTC) during the season
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggers from the GitHub UI

jobs:
  build-mme-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Today's DraftKings Slate
        # Assuming fetchDailySlate.js grabs the daily salary CSV
        run: node scripts/fetchDailySlate.js --sport mlb --output ./slate.csv

      - name: Generate Optimal Lineups (150 Max MME)
        # Runs the orchestrator and pipes stdout (the CSV format) into a file
        # Currently using --mock, replace with live GCP Vertex AI args when ready
        run: |
          node scripts/generateMlbLineups.js             --slate ./slate.csv             --n 150             --mock ./mock_schedule.json > ./DK_Submission_MME.csv
        env:
          # Uncomment and configure when connecting to real Vertex AI endpoints
          # GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          # GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload Lineups to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MLB-DFS-Optimal-Lineups
          path: ./DK_Submission_MME.csv
          retention-days: 1 # Only keep daily files for 24 hours to save storage
