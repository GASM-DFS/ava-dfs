name: "Deploy API to Cloud Run"

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    permissions:
      contents: 'read'
      id-token: 'write'
      
    env:
      SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
      VERTEX_ENDPOINT_ID: ${{ secrets.VERTEX_ENDPOINT_ID }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/218987434388/locations/global/workloadIdentityPools/github-vibe-pool/providers/github-vibe-provider'
          service_account: 'ava-dfs@gasm-481006.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy BigQuery Gold Views
        run: |
          # Idempotently deploy the defined SQL views
          node $GITHUB_WORKSPACE/cli/deployGoldViews.js \
            --project gasm-481006 \
            --file $GITHUB_WORKSPACE/mlb_gold_player_features.sql

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ava-dfs-api \
            --source . \
            --region us-central1 \
            --project gasm-481006 \
            --allow-unauthenticated \
            --service-account ava-dfs@gasm-481006.iam.gserviceaccount.com \
            --set-env-vars SPORTS_API_KEY=${SPORTS_API_KEY},VERTEX_ENDPOINT_ID=${VERTEX_ENDPOINT_ID},ODDS_API_KEY=${ODDS_API_KEY} \
            --quiet
