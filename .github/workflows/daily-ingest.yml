name: Daily DFS Slate Ingestion

on:
  schedule:
    # Run daily at 10:00 AM UTC (adjust as needed for your specific API slate availability)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      slate_type:
        description: 'Optional slate type (e.g., Main, Turbo, Showdown)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation

env:
  LOG_LEVEL: debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest-to-bigquery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Assumes you have a package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/218987434388/locations/global/workloadIdentityPools/github-vibe-pool/providers/github-vibe-provider'
          service_account: 'ava-dfs@gasm-481006.iam.gserviceaccount.com'

      - name: Inject Secrets from Secret Manager
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            SPORTS_API_KEY:gasm-481006/SPORTS_API_KEY
            ODDS_API_KEY:gasm-481006/ODDS_API_KEY
            SLACK_WEBHOOK_URL:gasm-481006/SLACK_WEBHOOK_URL

      - name: Fetch and Ingest Daily Slate
        run: |
          # Mirror stderr to a log file to capture exact error messages
          exec 2> >(tee -a /tmp/error.log >&2)

          # Helper function to retry commands with exponential back-off
          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          # Dynamically set today's date in YYYY-MM-DD format
          TODAY=$(date +%Y-%m-%d)
          
          echo "🚀 Starting daily ingestion pipeline for $TODAY..."

          # Read the optional workflow input
          SLATE_TYPE="${{ inputs.slate_type }}"

          for SPORT in nba mlb nfl; do
            if [ "$SPORT" = "nba" ]; then DATASET="nba_dfs_data"; PROJECT="gasm-481006"; fi
            if [ "$SPORT" = "mlb" ]; then DATASET="mlb_dfs_data"; PROJECT="gasm-481006"; fi
            if [ "$SPORT" = "nfl" ]; then DATASET="ava_dfs_analytics"; PROJECT="gasm-481006"; fi
            
            echo "🏈⚾🏀 Fetching $SPORT slate..."
            
            # Build command args dynamically
            ARGS="--provider dk --sport $SPORT --date $TODAY"
            if [ -n "$SLATE_TYPE" ]; then ARGS="$ARGS --type $SLATE_TYPE"; fi
            
            # Fetch slate, but don't fail the whole pipeline if an off-season sport has no slate
            node $GITHUB_WORKSPACE/scripts/fetchDailySlate.js $ARGS > /tmp/${SPORT}_slate.json || echo "No $SPORT slate found for today."
              
            # If a valid JSON payload was saved, ingest it to BigQuery
            if [ -s /tmp/${SPORT}_slate.json ]; then
              with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
                --project $PROJECT \
                --dataset $DATASET \
                --table daily_slates \
                --file /tmp/${SPORT}_slate.json
            fi
          done

      - name: Gather Omni-Context Data
        run: |
          exec 2> >(tee -a /tmp/error.log >&2)

          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          TODAY=$(date +%Y-%m-%d)
          
          echo "🌐 Calculating Micro Matchups..."
          if [ -s /tmp/nba_slate.json ]; then
            with_retry node $GITHUB_WORKSPACE/scripts/calculateMicroMatchups.js \
              --date $TODAY \
              --slate /tmp/nba_slate.json \
              --project gasm-481006 \
              --dataset nba_dfs_data \
              --mock > /tmp/micro_matchups.json
            with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
              --project gasm-481006 \
              --dataset nba_dfs_data \
              --table silver_micro_matchups \
              --file /tmp/micro_matchups.json
          fi

          echo "💤 Calculating Circadian Fatigue..."
          with_retry node $GITHUB_WORKSPACE/scripts/calculateFatigue.js \
            --date $TODAY \
            --file $GITHUB_WORKSPACE/mock_schedule.json > /tmp/team_fatigue.json
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
            --project gasm-481006 \
            --dataset nba_dfs_data \
            --table silver_team_fatigue \
            --file /tmp/team_fatigue.json
            
          if [ -s /tmp/nba_slate.json ]; then
            echo "📰 Analyzing Internet Sentiment for Top Players..."
            jq -r '.[].Name' /tmp/nba_slate.json | head -n 5 | while read -r PLAYER; do
              # Use a safe file name to prevent collision
              SAFE_NAME=$(echo "$PLAYER" | tr -d ' ' | tr '[:upper:]' '[:lower:]')
              with_retry node $GITHUB_WORKSPACE/scripts/ingestSentiment.js \
                --project gasm-481006 \
                --location us-central1 \
                --player "$PLAYER" \
                --date $TODAY > /tmp/sentiment_${SAFE_NAME}.json
              with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
                --project gasm-481006 \
                --dataset nba_dfs_data \
                --table silver_player_sentiment \
                --file /tmp/sentiment_${SAFE_NAME}.json
            done
          fi
          
          echo "🏈 Fetching NFL Vegas Odds..."
          node $GITHUB_WORKSPACE/scripts/ingestNflOdds.js --date $TODAY > /tmp/nfl_odds.json || echo "No NFL Odds found."
          if [ -s /tmp/nfl_odds.json ]; then
            with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
              --project gasm-481006 \
              --dataset ava_dfs_analytics \
              --table silver_vegas_odds \
              --file /tmp/nfl_odds.json
          fi

      echo "⚾ Fetching MLB Statcast Data..."
      python3 $GITHUB_WORKSPACE/scripts/ingestStatcast.py --date $TODAY > /tmp/statcast.json || echo "[]" > /tmp/statcast.json
      if [ -s /tmp/statcast.json ] && [ "$(cat /tmp/statcast.json)" != "[]" ]; then
        with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
          --project gasm-481006 \
          --dataset mlb_dfs_data \
          --table fact_statcast \
          --file /tmp/statcast.json
      fi

      - name: Fetch Box Scores and Build Features
        run: |
          exec 2> >(tee -a /tmp/error.log >&2)

          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          # Box scores are fetched for the games played the previous day
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          
          for SPORT in nba mlb nfl; do
            if [ "$SPORT" = "nba" ]; then DATASET="nba_dfs_data"; PROJECT="gasm-481006"; fi
            if [ "$SPORT" = "mlb" ]; then DATASET="mlb_dfs_data"; PROJECT="gasm-481006"; fi
            if [ "$SPORT" = "nfl" ]; then DATASET="ava_dfs_analytics"; PROJECT="gasm-481006"; fi
            
            echo "📊 Fetching $SPORT box scores for $YESTERDAY..."
            node $GITHUB_WORKSPACE/scripts/fetchBoxScores.js --provider generic --sport $SPORT --date $YESTERDAY > /tmp/${SPORT}_boxscores.json || echo "No $SPORT box scores."
            
            if [ -s /tmp/${SPORT}_boxscores.json ]; then
              with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js --project $PROJECT --dataset $DATASET --table fact_box_scores --file /tmp/${SPORT}_boxscores.json
            fi
          done
          
          echo "⚙️ Executing Feature Engineering..."
          with_retry node $GITHUB_WORKSPACE/scripts/buildFeatures.js --project gasm-481006 --dataset nba_dfs_data
          
          # NFL Feature Engineering
          with_retry node $GITHUB_WORKSPACE/scripts/buildFeatures.js --project gasm-481006 --dataset ava_dfs_analytics
          
          # MLB Feature Engineering (Deploys Gold SQL Views dynamically)
          with_retry node $GITHUB_WORKSPACE/cli/deployGoldViews.js --project gasm-481006 --file $GITHUB_WORKSPACE/mlb_gold_player_features.sql

      - name: Send Slack Notification on Failure
        if: failure()
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not found. Skipping notification."
            exit 0
          fi
          
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Read the last 15 lines of the error log, or provide a fallback message
          ERROR_DETAILS=$(tail -n 15 /tmp/error.log 2>/dev/null || echo "No stderr output captured. Check the Actions UI.")
          
          # Use jq to safely serialize the error details into the JSON payload (handles quotes/newlines)
          JSON_PAYLOAD=$(jq -n \
            --arg text "🚨 *Ava-DFS Alert:* The Daily DFS Slate Ingestion pipeline has failed! <$RUN_URL|Click here to view the logs and debug.>" \
            --arg err "$ERROR_DETAILS" \
            '{text: ($text + "\n*Error Details:*\n```\n" + $err + "\n```")}')
            
          curl -X POST -H 'Content-type: application/json' -d "$JSON_PAYLOAD" $SLACK_WEBHOOK_URL