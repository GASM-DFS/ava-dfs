name: Daily DFS Slate Ingestion

on:
  schedule:
    # Run daily at 10:00 AM UTC (adjust as needed for your specific API slate availability)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      slate_type:
        description: 'Optional slate type (e.g., Main, Turbo, Showdown)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation

env:
  LOG_LEVEL: debug

jobs:
  ingest-to-bigquery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Assumes you have a package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/218987434388/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'ava-dfs@gasm-481006.iam.gserviceaccount.com'

      - name: Fetch and Ingest Daily Slate
        run: |
          # Mirror stderr to a log file to capture exact error messages
          exec 2> >(tee -a /tmp/error.log >&2)

          # Helper function to retry commands with exponential back-off
          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          # Dynamically set today's date in YYYY-MM-DD format
          TODAY=$(date +%Y-%m-%d)
          
          echo "🚀 Starting daily ingestion pipeline for $TODAY..."

          # Read the optional workflow input
          SLATE_TYPE="${{ inputs.slate_type }}"

          if [ -n "$SLATE_TYPE" ]; then
            with_retry node $GITHUB_WORKSPACE/scripts/fetchDailySlate.js \
              --provider dk \
              --sport nba \
              --date $TODAY \
              --type "$SLATE_TYPE" > /tmp/today_slate.json
          else
            with_retry node $GITHUB_WORKSPACE/scripts/fetchDailySlate.js \
              --provider dk \
              --sport nba \
              --date $TODAY > /tmp/today_slate.json
          fi
            
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
            --project gasm-481006 \
            --dataset nba_dfs_data \
            --table daily_slates \
            --file /tmp/today_slate.json

      - name: Gather Omni-Context Data
        run: |
          exec 2> >(tee -a /tmp/error.log >&2)

          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          TODAY=$(date +%Y-%m-%d)
          
          echo "🌐 Calculating Micro Matchups..."
          with_retry node $GITHUB_WORKSPACE/scripts/calculateMicroMatchups.js \
            --date $TODAY \
            --slate /tmp/today_slate.json \
            --project gasm-481006 \
            --dataset nba_dfs_data \
            --mock | \
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
            --project gasm-481006 \
            --dataset nba_dfs_data \
            --table silver_micro_matchups \
            --file /dev/stdin

          echo "💤 Calculating Circadian Fatigue..."
          with_retry node $GITHUB_WORKSPACE/scripts/calculateFatigue.js \
            --date $TODAY \
            --file $GITHUB_WORKSPACE/mock_schedule.json | \
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
            --project gasm-481006 \
            --dataset nba_dfs_data \
            --table silver_team_fatigue \
            --file /dev/stdin
            
          echo "📰 Analyzing Internet Sentiment for Top Players..."
          # Extract player names safely and limit to 5 to protect API quotas during testing
          jq -r '.[].Name' /tmp/today_slate.json | head -n 5 | while read -r PLAYER; do
            with_retry node $GITHUB_WORKSPACE/scripts/ingestSentiment.js \
              --project gasm-481006 \
              --location us-central1 \
              --player "$PLAYER" \
              --date $TODAY | \
            with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
              --project gasm-481006 \
              --dataset nba_dfs_data \
              --table silver_player_sentiment \
              --file /dev/stdin
          done

      - name: Fetch Box Scores and Build Features
        run: |
          exec 2> >(tee -a /tmp/error.log >&2)

          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          # Box scores are fetched for the games played the previous day
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          
          echo "📊 Fetching box scores for $YESTERDAY..."
          with_retry node $GITHUB_WORKSPACE/scripts/fetchBoxScores.js --provider stats --sport nba --date $YESTERDAY | \
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js --project gasm-481006 --dataset nba_dfs_data --table fact_box_scores --file /dev/stdin
          
          echo "⚙️ Executing Feature Engineering..."
          with_retry node $GITHUB_WORKSPACE/scripts/buildFeatures.js --project gasm-481006 --dataset nba_dfs_data

      - name: Send Slack Notification on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not found. Skipping notification."
            exit 0
          fi
          
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Read the last 15 lines of the error log, or provide a fallback message
          ERROR_DETAILS=$(tail -n 15 /tmp/error.log 2>/dev/null || echo "No stderr output captured. Check the Actions UI.")
          
          # Use jq to safely serialize the error details into the JSON payload (handles quotes/newlines)
          JSON_PAYLOAD=$(jq -n \
            --arg text "🚨 *Ava-DFS Alert:* The Daily DFS Slate Ingestion pipeline has failed! <$RUN_URL|Click here to view the logs and debug.>" \
            --arg err "$ERROR_DETAILS" \
            '{text: ($text + "\n*Error Details:*\n```\n" + $err + "\n```")}')
            
          curl -X POST -H 'Content-type: application/json' -d "$JSON_PAYLOAD" $SLACK_WEBHOOK_URL