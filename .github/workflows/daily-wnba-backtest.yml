name: WNBA Daily Automated Backtest

on:
  schedule:
    # Run daily at 11:00 UTC (7:00 AM EDT / 6:00 AM EST)
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation

env:
  LOG_LEVEL: debug
  TZ: America/New_York

jobs:
  wnba-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/218987434388/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'ava-dfs@gasm-481006.iam.gserviceaccount.com'

      - name: Run Point-in-Time Backtest
        env:
          VERTEX_ENDPOINT_ID: ${{ secrets.VERTEX_ENDPOINT_ID }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: |
          # Helper function to retry commands with exponential back-off
          with_retry() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while true; do
              "$@" && break
              if (( attempt >= max_attempts )); then
                echo "❌ Command failed permanently after $max_attempts attempts." >&2
                return 1
              fi
              echo "⚠️ Command failed. Retrying in $delay seconds (Attempt $((attempt + 1))/$max_attempts)..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
          }

          # Determine yesterday's date
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          
          echo "🚀 Starting WNBA Automated Backtest for $YESTERDAY..."
          
          echo "1️⃣ Fetching Historical WNBA Slate..."
          with_retry node $GITHUB_WORKSPACE/scripts/fetchDailySlate.js \
            --provider sportsdataio \
            --sport wnba \
            --date $YESTERDAY \
            --api-key "$SPORTS_API_KEY" > /tmp/wnba_slate.json
            
          echo "2️⃣ Generating Point-in-Time Lineups..."
          node $GITHUB_WORKSPACE/scripts/generateWnbaLineups.js \
            --slate /tmp/wnba_slate.json \
            --project gasm-481006 \
            --dataset wnba_dfs_data \
            --location us-central1 \
            --endpoint-id "$VERTEX_ENDPOINT_ID" \
            --n 20 > /tmp/test_lineups.csv
            
          echo "3️⃣ Fetching Actual Box Scores..."
          with_retry node $GITHUB_WORKSPACE/scripts/fetchBoxScores.js \
            --provider sportsdataio \
            --sport wnba \
            --date $YESTERDAY > /tmp/wnba_actuals.json
            
          echo "4️⃣ Evaluating Model Performance (Log Report)..."
          node $GITHUB_WORKSPACE/scripts/backtestPortfolio.js \
            --csv /tmp/test_lineups.csv \
            --actuals /tmp/wnba_actuals.json

          echo "5️⃣ Ingesting Results to BigQuery..."
          node $GITHUB_WORKSPACE/scripts/backtestPortfolio.js \
            --csv /tmp/test_lineups.csv \
            --actuals /tmp/wnba_actuals.json \
            --date $YESTERDAY \
            --sport wnba \
            --json > /tmp/backtest_results.json
            
          cat /tmp/backtest_results.json | \
          with_retry node $GITHUB_WORKSPACE/cli/ingestToBigQuery.js \
            --project gasm-481006 \
            --dataset wnba_dfs_data \
            --table fact_backtest_results \
            --file /dev/stdin

      - name: Send Slack Summary on Success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_WEBHOOK_URL secret not found. Skipping notification."
            exit 0
          fi
          
          if [ -f /tmp/backtest_results.json ]; then
            MAX_SCORE=$(jq -r '.[0].MaxScore' /tmp/backtest_results.json)
            AVG_SCORE=$(jq -r '.[0].AvgScore' /tmp/backtest_results.json)
            BEST_ROSTER=$(jq -r '.[0].BestLineupRoster' /tmp/backtest_results.json)
            YESTERDAY=$(jq -r '.[0].GameDate' /tmp/backtest_results.json)
            
            MSG="📈 *Ava-DFS WNBA Backtest ($YESTERDAY)*\n• *Max Score:* $MAX_SCORE FPTS\n• *Avg Score:* $AVG_SCORE FPTS\n• *Best Lineup:* $BEST_ROSTER"
            
            JSON_PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')
            curl -X POST -H 'Content-type: application/json' -d "$JSON_PAYLOAD" $SLACK_WEBHOOK_URL
          fi

      - name: Send Slack Notification on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JSON_PAYLOAD=$(jq -n --arg text "🚨 *Ava-DFS Alert:* The WNBA Daily Backtest pipeline failed! <$RUN_URL|View Logs>" '{text: $text}')
          curl -X POST -H 'Content-type: application/json' -d "$JSON_PAYLOAD" $SLACK_WEBHOOK_URL